slot: 4
filename: model5.bin
active: true
name: plane
# Timer 1 — flight time, runs while SA↓ (armed), persists per-flight.
# mode encoding: 0=off, 1=ABS, 2=THR, 3=THR_REL, 4=THR_TRG, then
# (5 + (swsrc-1)) for switch-driven. SA↓ = swsrc 3 → mode = 5 + 2 = 7.
timers:
- i: 0
  mode: 7
  minute_beep: 1
  persistent: 1
  name: Flt
# Startup switch-warnings — SA/SB/SC/SD must be ↑ (unpressed / PWM low) at
# model load. SE and SF are momentary shoulder buttons that spring back to ↑
# on their own, so warning on them is noise — always unpressed when idle.
