# L01 — STICKY toggle for AUTO TUNE: each rising edge of SF↓ flips state.
# func 18 = LS_FUNC_STICKY (SR latch); v1 = SET edge, v2 = RESET edge.
# When v1 == v2 == same momentary, the lastValue.last bit alternates
# correctly between checking v1/v2, giving press-on / press-off.
