# Baloo — FT Sea Duck, foam amphib twin. Slow, floaty, very light wing
# loading. Conventional tail + rudder, with a little differential-thrust
# yaw assist. Currently at INAV 9.0 stock — the biggest pre-tune target.
name: Baloo
config: conventional
anchor: false

geometry:                # FT spec sheet (flitetest.com store + plans PDF)
  span_mm: 1422
  wing_area_dm2: 31.9    # FT: 494.5 in²
  mac_mm: 229            # FT: 9 in constant chord
  length_mm: 1067        # FT: 42 in

mass:
  auw_g: 1450            # user's build w/ 3S 2200 (FT lists 1301 g lighter)
  cg_pct_mac: 28         # FT: CG 64 mm from LE ÷ 229 mm chord = 28%

surfaces:                # FT recommends 16° throws; ailerons added by user
  roll:  { area_dm2: 2.0, arm_mm: 500, max_defl_deg: 16 }   # ailerons (pair) — area ESTIMATE
  pitch: { area_dm2: 2.4, arm_mm: 800, max_defl_deg: 16 }   # elevator — area ESTIMATE, arm ← 1067 mm tail
  yaw: rudder+diffthrust

power:
  cells: 3
  capacity_mah: 2200
  motors: 2
  static_thrust_g: 1600  # ESTIMATE, twin 2212 10x4.5 on 3S (T/W ≈ 1.1)

aero:
  cl_max: 1.2            # high-lift flat foam wing
  cd0: 0.040            # draggy foamboard + floats
  oswald: 0.80
  rho: 1.225
