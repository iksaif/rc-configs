# Dolphin — AtomRC Dolphin Pro, EPP elevon delta + movable V-tail on twin
# booms, single 6S pusher. Wing loading ~ Swordfish, but short span (low
# roll inertia) + effective elevons + big power → agile and fast-rolling.
name: Dolphin
config: elevon
anchor: false

geometry:                # AtomRC Dolphin Pro official specs
  span_mm: 800
  wing_area_dm2: 16.96   # AtomRC: 16.96 dm²
  mac_mm: 240            # ESTIMATE (S/b ≈ 212 mm mean; delta MAC a bit higher)
  length_mm: 862         # AtomRC: 862 mm

mass:
  auw_g: 1500            # ~1.5 kg AUW on 6S 21700 (AtomRC)
  cg_pct_mac: 18         # ESTIMATE — AtomRC marks CG on the wing, no number;
                         # start default, move 3–4 mm fwd after maiden (manual)

surfaces:                # elevons carry both axes; original Dolphin ran ~10 mm
  # throws + 40–60% expo (twitchy) — pitch authority ≈ 1.75× roll per the dump.
  roll:  { area_dm2: 2.0, arm_mm: 300, max_defl_deg: 16 }   # elevon roll component — ESTIMATE
  pitch: { area_dm2: 3.5, arm_mm: 430, max_defl_deg: 18 }   # elevons + V-tail pitch — ESTIMATE
  yaw: vtail

power:
  cells: 6
  capacity_mah: 3200
  motors: 1
  static_thrust_g: 2081  # AtomRC: full-load pull 2081 g (T/W 1.3–1.4)

aero:
  cl_max: 1.0            # reflexed/thin delta section
  cd0: 0.028
  oswald: 0.80
  rho: 1.225
